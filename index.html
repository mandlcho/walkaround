<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Walkaround</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Screen 1: Upload -->
  <div id="screen-upload" class="screen active">
    <div class="upload-card">
      <h1>Walkaround</h1>
      <p>Upload a floor plan to generate a 3D walkthrough</p>
      <div id="drop-zone" class="drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Tap to select or drag &amp; drop</span>
        <input type="file" id="file-input" accept="image/*">
      </div>
      <p class="hint">Works best with clean black-and-white floor plans</p>
    </div>
  </div>

  <!-- Screen 2: Processing -->
  <div id="screen-processing" class="screen">
    <div class="processing-container">
      <canvas id="processing-canvas"></canvas>
      <div id="processing-status">
        <div class="spinner"></div>
        <span id="processing-text">Analyzing floor plan...</span>
      </div>
      <div id="processing-progress">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- Screen 3: Walkthrough -->
  <div id="screen-walkthrough" class="screen">
    <canvas id="three-canvas"></canvas>
    <canvas id="minimap-canvas"></canvas>
    <button id="btn-exit">✕</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
