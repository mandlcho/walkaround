<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Walkaround — Instant Floor Plan Walkthroughs</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
</head>
<body>

  <!-- SCREEN 1: Upload -->
  <div id="screen-upload" class="screen active">
    <div class="upload-container">
      <div class="brand">
        <h1>Walkaround</h1>
        <p class="tagline">Upload a floor plan. Walk through it instantly.</p>
      </div>

      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-inner">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">Tap to upload floor plan</p>
          <p class="drop-hint">PNG or JPG &middot; Black &amp; white works best</p>
        </div>
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" hidden>
      </div>

      <div id="preview-section" class="preview-section hidden">
        <div class="preview-wrap">
          <canvas id="preview-canvas"></canvas>
          <button id="btn-clear" class="btn-icon" aria-label="Remove image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <button id="btn-generate" class="btn-primary">Generate Walkthrough</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: Processing -->
  <div id="screen-processing" class="screen">
    <div class="processing-container">
      <div class="spinner"></div>
      <p class="processing-text">Detecting walls&hellip;</p>
    </div>
  </div>

  <!-- SCREEN 3: Walkthrough -->
  <div id="screen-walkthrough" class="screen">
    <canvas id="three-canvas"></canvas>

    <!-- HUD overlay -->
    <div id="hud" class="hud">
      <button id="btn-back" class="hud-btn top-left" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button id="btn-minimap" class="hud-btn top-right" aria-label="Toggle minimap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <canvas id="minimap-canvas" class="minimap hidden"></canvas>
    </div>

    <!-- Touch controls -->
    <div id="touch-controls" class="touch-controls">
      <div id="joystick-zone" class="joystick-zone">
        <div id="joystick-base" class="joystick-base">
          <div id="joystick-thumb" class="joystick-thumb"></div>
        </div>
      </div>
      <div id="look-zone" class="look-zone"></div>
    </div>
  </div>

  <script src="js/floorplan.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
